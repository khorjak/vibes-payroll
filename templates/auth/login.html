<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Payroll</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-slate-50 flex items-center justify-center">
<div class="w-full max-w-sm">
  <div class="text-center mb-8">
    <span class="text-2xl font-bold text-slate-900 tracking-tight">Payroll</span>
    <p class="text-sm text-slate-500 mt-1">Sign in to your account</p>
  </div>

  <div class="bg-white rounded-xl border border-slate-200 shadow-sm px-8 py-8">
    {% if error %}
    <div class="mb-4 px-4 py-3 rounded-md bg-red-50 text-red-700 text-sm ring-1 ring-red-200">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/auth/login" class="space-y-5">
      <input type="hidden" name="next" value="{{ next }}">

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
        <input type="text" name="username" autocomplete="username" autofocus required
               class="w-full text-sm rounded-md border border-slate-300 px-3 py-2 bg-white
                      focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input type="password" name="password" autocomplete="current-password" required
               class="w-full text-sm rounded-md border border-slate-300 px-3 py-2 bg-white
                      focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
      </div>

      <button type="submit"
              class="w-full py-2 px-4 bg-indigo-600 text-white text-sm font-medium rounded-md
                     hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">
        Sign In
      </button>
    </form>
  </div>

  <p class="text-center text-xs text-slate-400 mt-6">
    Oklahoma Payroll System &mdash; Internal Use Only
  </p>
</div>
</body>
</html>
