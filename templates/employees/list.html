{% extends "layout.html" %}
{% block title %}Employees — Payroll{% endblock %}
{% block breadcrumb %}Employees{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold text-slate-900">Employees</h1>
  <a href="/employees/new"
     class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition-colors">
    + New Employee
  </a>
</div>

<!-- Filters -->
<div class="bg-white rounded-lg ring-1 ring-slate-200 p-4 mb-4 flex flex-wrap items-end gap-3">
  <div class="flex-1 min-w-48">
    <label class="block text-xs font-medium text-slate-500 mb-1">Search</label>
    <input
      type="search"
      name="q"
      value="{{ q }}"
      placeholder="Name or department…"
      hx-get="/employees/"
      hx-trigger="input changed delay:300ms, search"
      hx-target="#employee-table"
      hx-select="#employee-table"
      hx-include="[name='status_filter'],[name='company_filter']"
      class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
  </div>
  <div>
    <label class="block text-xs font-medium text-slate-500 mb-1">Status</label>
    <select
      name="status_filter"
      hx-get="/employees/"
      hx-trigger="change"
      hx-target="#employee-table"
      hx-select="#employee-table"
      hx-include="[name='q'],[name='company_filter']"
      class="rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
      <option value="">All statuses</option>
      {% for s in statuses %}
      <option value="{{ s }}" {{ 'selected' if status_filter == s }}>{{ s | title }}</option>
      {% endfor %}
    </select>
  </div>
  <div>
    <label class="block text-xs font-medium text-slate-500 mb-1">Company</label>
    <select
      name="company_filter"
      hx-get="/employees/"
      hx-trigger="change"
      hx-target="#employee-table"
      hx-select="#employee-table"
      hx-include="[name='q'],[name='status_filter']"
      class="rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
      <option value="">All companies</option>
      {% for c in companies %}
      <option value="{{ c.id }}" {{ 'selected' if company_filter == c.id|string }}>{{ c.name }}</option>
      {% endfor %}
    </select>
  </div>
  <span class="htmx-indicator text-xs text-slate-400 self-center">Loading…</span>
</div>

<!-- Table -->
<div class="bg-white rounded-lg ring-1 ring-slate-200 p-5 overflow-x-auto">
  {% include "employees/_table.html" %}
</div>
{% endblock %}
